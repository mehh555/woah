services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: woah
      POSTGRES_USER: woah
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woah"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__WoahDb: "Host=db;Database=woah;Username=woah;Password=${DB_PASSWORD:-dev-password}"
      AllowedCorsOrigins__0: "http://localhost:8080"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"

volumes:
  pgdata: