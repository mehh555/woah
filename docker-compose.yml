version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: woah_db
    environment:
      POSTGRES_DB: woah
      POSTGRES_USER: woah
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woah"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: woah_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__WoahDb: "Host=db;Database=woah;Username=woah;Password=${DB_PASSWORD:-dev-password}"
      AllowedCorsOrigins__0: "http://localhost:5173"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: woah_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata: